# ============================================================
# 主工作流 (main.yml) - 实际执行的工作流
# 项目: actions-ops-lab
# 说明: 这是"干活的"文件,会被 GitHub Actions 实际触发执行。
#       其余 actions-modules/ 下的文件仅作为本地参考,不参与上传/执行。
# ============================================================

name: CI/CD  # 这个 workflow 的名字,会显示在 Actions 页面左侧栏

on:  # on 字段:定义"什么时候触发"这个 workflow
  push:  # 当有人 push 代码到远程仓库时
    branches: [main, develop]  # 仅 main 和 develop 这两个分支的 push 才触发
    paths-ignore:  # 但以下路径的文件变更不触发(改文档不浪费 CI 额度)
      - '**.md'  # 所有 .md 文件(** 匹配任意层级目录)
      - 'docs/**'  # docs 目录下的所有文件
  pull_request:  # 当有人提交 Pull Request 时触发
    branches: [main]  # 仅 PR 的目标分支是 main 时才触发
  workflow_dispatch: # 允许在 Actions 页面手动点 "Run workflow" 按钮触发(调试用)

# 并发控制: 同一分支的新推送会取消旧的运行
concurrency:  # concurrency 字段:控制并发,避免同一任务重复跑浪费额度
  group: ${{ github.workflow }}-${{ github.ref }}  # 分组键 = workflow名 + 分支名;同组才算"重复"
  cancel-in-progress: true  # 新运行一启动,就取消同组里还在跑的旧运行

# 最小权限原则: 默认只读
permissions:  # permissions 字段:限制这个 workflow 拿到的 GITHUB_TOKEN 权限范围
  contents: read  # 只给仓库内容"只读"权限(不给写权限,更安全)

jobs:  # jobs 字段:定义具体要跑的任务,下面每个缩进块是一个独立 job
  # ---------- 任务 1: 代码检查 ----------
  lint:  # 这个 job 的 id 叫 lint(自定义名,其他 job 用 needs 引用它)
    name: Lint  # name:在 Actions 页面显示的友好名称
    runs-on: ubuntu-latest  # runs-on:在 GitHub 提供的最新版 Ubuntu Linux 机器上跑
    timeout-minutes: 1  # 最多跑 15 分钟,超时自动取消(防止卡死烧额度)
    steps:  # steps:这个 job 要按顺序执行的步骤列表
      - name: 检出代码  # 第一步,名字叫"检出代码"
        uses: actions/checkout@v4  # uses:调用官方 action,把仓库代码拉到 runner 上(默认不带代码)

      - name: 安装 Node.js  # 第二步
        uses: actions/setup-node@v4  # 调用官方 action 安装指定版本的 Node.js
        with:  # with:给这个 action 传参数
          node-version: '20'  # 安装 Node 20 版本
          cache: 'npm'  # 自动缓存 npm 依赖目录,加速后续 npm ci

      - name: 安装依赖  # 第三步
        run: npm ci  # run:执行一条 shell 命令;npm ci 严格按 lock 文件装依赖(快且结果确定)

      - name: 运行 lint  # 第四步
        run: npm run lint  # 跑 package.json 里 scripts.lint 脚本(代码风格/语法检查)

  # ---------- 任务 2: 测试 (多版本矩阵) ----------
  test:  # 第二个 job,id 叫 test
    name: Test (Node ${{ matrix.node-version }})  # 名字里带矩阵变量,区分每个 Node 版本
    needs: lint  # needs:等 lint 这个 job 成功后才开始跑(定义依赖顺序)
    runs-on: ubuntu-latest  # 同样在 Ubuntu 上跑
    strategy:  # strategy:执行策略,这里用矩阵(matrix)一次跑多组组合
      fail-fast: false  # 某个版本失败也不取消其他版本(全部跑完一起看结果)
      matrix:  # matrix:定义要遍历的变量
        node-version: [18, 20, 22]  # 分别用 Node 18 / 20 / 22 各跑一遍(共 3 份)
    steps:  # steps:注意矩阵会把下面这些步骤复制 3 份分别执行
      - uses: actions/checkout@v4  # 拉代码(省略了 name,默认用 action 名)
      - uses: actions/setup-node@v4  # 安装 Node.js
        with:
          node-version: ${{ matrix.node-version }}  # 用矩阵当前轮到的那个 Node 版本
          cache: 'npm'  # 缓存依赖
      - run: npm ci  # 装依赖
      - run: npm test  # 跑测试脚本

  # ---------- 任务 3: 构建 ----------
  build:  # 第三个 job,id 叫 build
    name: Build  # 显示名 Build
    needs: test  # 等 test 全部版本通过后才开始构建
    runs-on: ubuntu-latest  # Ubuntu 环境
    steps:
      - uses: actions/checkout@v4  # 拉代码
      - uses: actions/setup-node@v4  # 安装 Node.js
        with:
          node-version: '20'  # 构建固定用 Node 20
          cache: 'npm'  # 缓存依赖
      - run: npm ci  # 装依赖
      - run: npm run build  # 执行构建,产物通常输出到 dist/ 目录
      - name: 上传构建产物  # 把构建结果存档,供下载
        uses: actions/upload-artifact@v4  # 调用官方 action 上传制品
        with:
          name: build-output  # 制品名,Actions 页面可按此名下载
          path: dist/  # 要上传的目录(构建产物在这里)
          retention-days: 7  # 制品保留 7 天,到期自动删除

  # ---------- 任务 4: 汇总 (总是执行) ----------
  report:  # 第四个 job,id 叫 report
    name: Report  # 显示名 Report
    needs: [lint, test, build]  # 声明依赖前面三个 job(等待它们结束)
    if: always()  # 关键:无论前面成功还是失败,这个 job 都会执行(用于汇总结果)
    runs-on: ubuntu-latest  # Ubuntu 环境
    steps:
      - name: 输出汇总  # 打印前面各 job 的结果
        run: |  # run: | 表示后面是多行命令(| 保留换行)
          echo "lint=${{ needs.lint.result }}"  # 打印 lint 的结果(success/failure/skipped)
          echo "test=${{ needs.test.result }}"  # 打印 test 的结果
          echo "build=${{ needs.build.result }}"  # 打印 build 的结果
