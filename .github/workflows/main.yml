# ============================================================
# 主工作流 (main.yml) — 实际执行的工作流
# 项目: actions-ops-lab
# 说明: 这是"干活的"文件,会被 GitHub Actions 实际触发执行。
#       其余 actions-modules/ 下的文件仅作为本地参考,不参与上传/执行。
# ============================================================

name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main]
  workflow_dispatch: # 允许在 Actions 页面手动触发

# 并发控制: 同一分支的新推送会取消旧的运行
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# 最小权限原则: 默认只读
permissions:
  contents: read

jobs:
  # ---------- 任务 1: 代码检查 ----------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 运行 lint
        run: npm run lint

  # ---------- 任务 2: 测试 (多版本矩阵) ----------
  test:
    name: Test (Node ${{ matrix.node-version }})
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci
      - run: npm test

  # ---------- 任务 3: 构建 ----------
  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
          retention-days: 7

  # ---------- 任务 4: 汇总 (总是执行) ----------
  report:
    name: Report
    needs: [lint, test, build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: 输出汇总
        run: |
          echo "lint=${{ needs.lint.result }}"
          echo "test=${{ needs.test.result }}"
          echo "build=${{ needs.build.result }}"
