# ============================================================
# 主工作流 (main.yml) - 实际执行的工作流
# 项目: actions-ops-lab
# 说明: 这是"干活的"文件,会被 GitHub Actions 实际触发执行。
#       其余 actions-modules/ 下的文件仅作为本地参考,不参与上传/执行。
# ============================================================

name: Actions-ops-lab  # 这个 workflow 的名字,会显示在 Actions 页面左侧栏

on:  # on 字段:定义"什么时候触发"这个 workflow
  push:  # 当有人 push 代码到远程仓库时
    branches: [main, develop]  # 仅 main 和 develop 这两个分支的 push 才触发
    paths-ignore:  # 但以下路径的文件变更不触发(改文档不浪费 CI 额度)
      - '**.md'  # 所有 .md 文件(** 匹配任意层级目录)
      - 'docs/**'  # docs 目录下的所有文件
  pull_request:  # 当有人提交 Pull Request 时触发
    branches: [main]  # 仅 PR 的目标分支是 main 时才触发
  workflow_dispatch: # 允许在 Actions 页面手动点 "Run workflow" 按钮触发(调试用)

# 并发控制: 同一分支的新推送会取消旧的运行
concurrency:  # concurrency 字段:控制并发,避免同一任务重复跑浪费额度
  group: ${{ github.workflow }}-${{ github.ref }}  # 分组键 = workflow名 + 分支名;同组才算"重复"
  cancel-in-progress: true  # 新运行一启动,就取消同组里还在跑的旧运行

# 最小权限原则: 默认只读
permissions:  # permissions 字段:限制这个 workflow 拿到的 GITHUB_TOKEN 权限范围
  contents: read  # 只给仓库内容"只读"权限(不给写权限,更安全)

jobs:  # jobs 字段:定义具体要跑的任务,下面每个缩进块是一个独立 job
  # ---------- 任务 1: Hello-World (最先跑,无 needs) ----------
  Hello-World:  # 这个 job 的 id(其他 job 用 needs 引用它)
    name: Hello-World  # name:在 Actions 页面显示的友好名称
    runs-on: ubuntu-latest  # runs-on:在 GitHub 提供的最新版 Ubuntu Linux 机器上跑
    timeout-minutes: 15  # 最多跑 15 分钟,超时自动取消(防止卡死烧额度)
    steps:  # steps:这个 job 要按顺序执行的步骤列表
      - name: Hello-World
        run: echo "Hello, GitHub Actions!"

  # ---------- 任务 2: Node (等任务1成功后跑) ----------
  nodejs:
    name: Node
    needs: Hello-World  # needs:等 Hello-World 成功后才开始(形成前后顺序 -> )
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Node.js安装
        uses: actions/setup-node@v4
        with:
          node-version: '20'
  build:
    name: 构建成功查询Node版本
    needs: nodejs
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Node.js查询
        run: node -v

  # ---------- 任务 3: 矩阵多平台 (等任务2成功后跑) ----------
  matrix-runner:
    needs: build  # needs:等 build 成功后才开始;整体顺序链: Hello-World -> nodejs -> matrix-runner
    # 注意:这里 3 个 os 仍会并行(matrix 的特性),但整个 matrix-runner 排在 nodejs 之后
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - run: echo "running on ${{ matrix.os }}"
  
  nodex-versions:
    needs: matrix-runner
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22, 24]
    steps:
      - name: Node.js安装
        if: matrix.node-version == '24'
        run: echo “Node,24 版本安装成功,初级部署中”
 
        

